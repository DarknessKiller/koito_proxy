name: Go Test

on:
  push:
    branches: [ master, development ]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'

  pull_request:
    branches: [ master, development ]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.x'

    - name: Run Go Test
      run: go test -v ./...

